<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null_X</title>
    <link rel="stylesheet" href="styles.css">   <!-- your existing CSS file -->
    <script src="main.js" defer></script>      <!-- your existing main.js -->
</head>
<body>

    <!-- SCREEN 1: Grey boot screen with green scrolling text -->
    <div id="boot-screen" class="screen">
        <div class="terminal">
            <div id="green-text" class="green-text"></div>
        </div>
    </div>

    <!-- SCREEN 2: Welcome + Click to Cloak -->
    <div id="welcome-screen" class="screen hidden">
        <div class="welcome-content">
            <h1>Welcome to <span class="highlight">Null_X</span> <span class="version">V2.17</span></h1>
            <p class="cloak-instruction">Click anywhere to cloak</p>
        </div>
    </div>

    <!-- SCREEN 3: Main Dashboard (after cloaking) -->
    <div id="main-screen" class="screen hidden">
        <header>
            <h2>Null_X V2.17</h2>
        </header>

        <div class="cards-container">
            <div class="card" onclick="navigateTo('games')">
                <h3>🎮 Games</h3>
                <p>Browse & play unblocked games</p>
            </div>

            <div class="card" onclick="navigateTo('proxy')">
                <h3>🌐 Proxy</h3>
                <p>Web proxy / unblocker</p>
            </div>

            <div class="card" onclick="navigateTo('settings')">
                <h3>⚙️ Settings</h3>
                <p>Customize Null_X</p>
            </div>
        </div>
    </div>

    <script>
        // === BOOT SCREEN ANIMATION ===
        const phrases = [
            "INITIALIZING NULL_X CORE...",
            "BYPASSING FILTER PROTOCOLS...",
            "LOADING GAME DATABASE...",
            "ESTABLISHING SECURE TUNNEL...",
            "NULL_X V2.17 ONLINE"
        ];

        let i = 0;
        const greenText = document.getElementById('green-text');

        function typePhrase() {
            if (i < phrases.length) {
                greenText.textContent = phrases[i];
                i++;
                setTimeout(typePhrase, 800);   // speed of text change
            } else {
                // After all phrases, switch to welcome screen
                setTimeout(() => {
                    document.getElementById('boot-screen').classList.add('hidden');
                    document.getElementById('welcome-screen').classList.remove('hidden');
                }, 1000);
            }
        }

        // Start boot sequence when page loads
        window.addEventListener('load', () => {
            typePhrase();
        });

        // === CLICK ANYWHERE ON WELCOME SCREEN TO "CLOAK" ===
        const welcomeScreen = document.getElementById('welcome-screen');
        welcomeScreen.addEventListener('click', () => {
            // Attempt to close the tab (works only if the tab was opened by JS)
            // Many people use this as a quick "panic button"
            window.close();

            // Fallback: If close() doesn't work (most cases), go to main dashboard
            setTimeout(() => {
                welcomeScreen.classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
            }, 100);
        });

        // Simple navigation placeholder (you can expand this later)
        function navigateTo(page) {
            alert(`Navigating to ${page} section...`); 
            // Later you can hide main-screen and show different content, or use pages/iframes
        }
    </script>

</body>
</html>
